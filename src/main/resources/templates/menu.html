<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Imóveis</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header class="header-premium">

    <div class="animated-bg">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
        <div class="glow"></div>
    </div>

    <div class="header-top">
        <img th:src="@{/img/logo.png}" class="logo">

        <div class="social-header">
            <img th:src="@{/img/whatsapp.png}">
            <img th:src="@{/img/instagram.png}">
        </div>
    </div>

    <nav class="navbar">
        <a href="/" class="ativo">HOME</a>
        <a href="/quem-somos">QUEM SOMOS</a>
        <a href="/menu">IMÓVEIS</a>
        <a href="/contato">CONTATO</a>
    </nav>

</header>

<!-- MÉDIO -->
<section class="catalogo">

    <h2 class="titulo">Médio Padrão</h2>

    <div class="grid">

        <div class="card"
             th:each="i : ${medio}"
             th:onclick="'window.location.href=\'/imovel/' + ${i.id} + '\''">

            <div class="img-box">

                <img th:if="${i.imagens != null and !i.imagens.isEmpty()}"
                     th:src="@{${i.imagens[0]}}">

                <!-- BADGE -->
                <span class="badge"
                      th:classappend="${i.tipo == 'Aluguel'} ? ' aluguel' : ' venda'"
                      th:text="${i.tipo}">
                </span>

            </div>

            <div class="conteudo">

                <h3 th:text="${i.titulo}"></h3>

                <p class="preco"
                   th:text="'R$ ' + ${#numbers.formatDecimal(i.preco,1,'POINT',2,'COMMA')}"></p>

                <div class="infos">

                    <div class="info-item">
                        <img th:src="@{/img/casa.png}">
                        <span th:text="${i.quartos}"></span>
                    </div>

                    <div class="info-item">
                        <img th:src="@{/img/banheiro.png}">
                        <span th:text="${i.banheiros}"></span>
                    </div>

                    <div class="info-item">
                        <img th:src="@{/img/garagem.png}">
                        <span th:text="${i.vagas}"></span>
                    </div>

                    <!-- ÁREA CORRIGIDA -->
                    <div class="info-item">
                        <img th:src="@{/img/area.png}">
                        <span th:text="${i.area} + ' m²'"></span>
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<!-- ALTO -->
<section class="catalogo">

    <h2 class="titulo">Alto Padrão</h2>

    <div class="grid">

        <div class="card"
             th:each="i : ${alto}"
             th:onclick="'window.location.href=\'/imovel/' + ${i.id} + '\''">

            <div class="img-box">

                <img th:if="${i.imagens != null and !i.imagens.isEmpty()}"
                     th:src="@{${i.imagens[0]}}">

                <span class="badge"
                      th:classappend="${i.tipo == 'Aluguel'} ? ' aluguel' : ' venda'"
                      th:text="${i.tipo}">
                </span>

            </div>

            <div class="conteudo">

                <h3 th:text="${i.titulo}"></h3>

                <p class="preco"
                   th:text="'R$ ' + ${#numbers.formatDecimal(i.preco,1,'POINT',2,'COMMA')}"></p>

                <div class="infos">

                    <div class="info-item">
                        <img th:src="@{/img/casa.png}">
                        <span th:text="${i.quartos}"></span>
                    </div>

                    <div class="info-item">
                        <img th:src="@{/img/banheiro.png}">
                        <span th:text="${i.banheiros}"></span>
                    </div>

                    <div class="info-item">
                        <img th:src="@{/img/garagem.png}">
                        <span th:text="${i.vagas}"></span>
                    </div>

                    <div class="info-item">
                        <img th:src="@{/img/area.png}">
                        <span th:text="${i.area} + ' m²'"></span>
                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

<footer class="footer">
    <div class="footer-container">

        <div class="footer-col">

        </div>

            <p>(21) 99535-8009</p>
            <p>(21) 99462-3268</p>
        </div>

        <div class="footer-col">

        </div>

        <div class="footer-col social">
            <h3>Redes</h3>
            <a href="#">WhatsApp</a>
            <a href="#">Instagram</a>
        </div>

    </div>
</footer>

</body>
</html>
