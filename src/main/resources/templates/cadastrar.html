<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastrar Imóvel</title>
    <link rel="stylesheet" href="/css/cadastrar.css">
</head>
<body>

<div class="form-container">

    <div class="form-box">

        <h2>Cadastrar Novo Imóvel</h2>

        <!-- 🔥 FORM CORRETO -->
        <form action="/salvar" method="post" enctype="multipart/form-data">

            <div class="form-group">
                <label>Título do imóvel</label>
                <input type="text" name="titulo" required>
            </div>

            <div class="form-group">
                <label>Preço</label>
                <input type="number" name="preco" required>
            </div>

            <div class="form-group">
                <label>Endereço</label>
                <input type="text" name="endereco" required>
            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>Quartos</label>
                    <input type="number" name="quartos">
                </div>

                <div class="form-group">
                    <label>Banheiros</label>
                    <input type="number" name="banheiros">
                </div>

                <div class="form-group">
                    <label>Vagas</label>
                    <input type="number" name="vagas">
                </div>

            </div>

            <div class="form-group">
                <label>Latitude</label>
                <input type="text" name="latitude">
            </div>

            <div class="form-group">
                <label>Longitude</label>
                <input type="text" name="longitude">
            </div>

            <div class="form-group">
                <label>Fotos do imóvel</label>
                <input type="file" name="imagens" multiple>
            </div>

            <div class="form-group">
                <label>Tipo</label>
                <select name="tipo" required>
                    <option value="Venda">Venda</option>
                    <option value="Aluguel">Aluguel</option>
                </select>
            </div>

            <div class="form-group">
                <label>Área (m²)</label>
                <input type="number" name="area">
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select name="categoria" required>
                    <option value="">Selecione</option>
                    <option value="MEDIO">Médio Padrão</option>
                    <option value="ALTO">Alto Padrão</option>
                </select>
            </div>

            <!-- 🔥 BOTÃO SALVAR -->
            <button type="submit" class="btn-save">
                Cadastrar Imóvel
            </button>

        </form>

    </div>

</div>

<hr class="linha">

<h2 class="subtitulo">Gerenciar Imóveis</h2>

<div class="admin-grid">

    <div class="admin-card" th:each="i : ${imoveis}">

        <!-- IMAGEM -->
        <img th:if="${i.imagens != null and !i.imagens.isEmpty()}"
             th:src="@{${i.imagens[0]}}">

        <img th:if="${i.imagens == null or i.imagens.isEmpty()}"
             src="/img/placeholder.png">

        <!-- BADGE -->
        <span th:if="${i.vendido}" class="badge-vendido">VENDIDO</span>

        <div class="admin-info">
            <h4 th:text="${i.titulo}"></h4>
            <p th:text="'R$ ' + ${i.preco}"></p>
        </div>

        <div class="admin-actions">

            <!-- EXCLUIR -->
            <form th:action="@{'/imovel/excluir/' + ${i.id}}" method="post">
                <button type="submit" class="btn-delete">Excluir</button>
            </form>

            <!-- VENDIDO -->
            <form th:action="@{'/imovel/vendido/' + ${i.id}}" method="post"
                  th:if="${!i.vendido}">
                <button type="submit" class="btn-vender">
                    Marcar como vendido
                </button>
            </form>

            <!-- EDITAR -->
            <a th:href="@{'/imovel/editar/' + ${i.id}}" class="btn-editar">
                Editar
            </a>

        </div>

    </div>

</div>

<a href="/logout" class="btn-logout">Sair</a>

</body>
</html>
