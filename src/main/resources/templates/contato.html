<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

<!-- ICONES -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<nav class="navbar">
    <a href="/">HOME</a>
    <a href="/menu">IMÓVEIS</a>
    <a href="/contato" class="ativo">CONTATO</a>
</nav>

<section class="contato-page">

    <!-- CONTATO -->
    <div class="contato-info">

        <h1>Fale com a gente</h1>
        <p>Estamos prontos para te ajudar a encontrar o imóvel ideal.</p>

        <p>
            <i class="fa-solid fa-envelope"></i>
            Cmonacoincorporadora@gmail.com
        </p>

        <p>
            <i class="fa-brands fa-whatsapp"></i>
            (21) 99535-8009
        </p>

        <p>
            <i class="fa-brands fa-instagram"></i>
            @cmonaco.incorporadora
        </p>

    </div>

    <hr class="divider">

    <!-- AGENDAMENTO -->
    <div class="agenda">

        <h2>Agende sua visita</h2>
        <p>Escolha o melhor dia e horário.</p>

        <form action="/agendar" method="post" class="form-agenda" onsubmit="return enviarWhats(event)">

            <input type="text" name="nome" placeholder="Seu nome" required>

            <input type="tel" name="telefone" placeholder="Telefone" required>

            <!-- CPF CORRIGIDO -->
            <input type="text" name="cpf" placeholder="CPF (000.000.000-00)" maxlength="14" required>

            <input type="date" name="data" required>

            <!-- HORÁRIOS -->
            <div class="horarios">

                <button type="button">09:00</button>
                <button type="button">10:00</button>
                <button type="button">11:00</button>

                <button type="button">14:00</button>
                <button type="button">15:00</button>
                <button type="button">16:00</button>

            </div>

            <input type="hidden" name="horario" id="horarioSelecionado">

            <button type="submit" class="btn-visita">
                Confirmar visita
            </button>

        </form>

    </div>

</section>

<script>

// selecionar horário
document.querySelectorAll('.horarios button').forEach(btn => {
    btn.addEventListener('click', () => {

        document.querySelectorAll('.horarios button')
            .forEach(b => b.classList.remove('ativo'));

        btn.classList.add('ativo');

        document.getElementById('horarioSelecionado').value = btn.innerText;
    });
});

// máscara CPF
document.querySelector('input[name="cpf"]').addEventListener('input', function(e) {

    let v = e.target.value.replace(/\D/g, '');

    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

    e.target.value = v;
});

// enviar pro whatsapp
function enviarWhats(event) {

    let nome = document.querySelector('input[name="nome"]').value;
    let telefone = document.querySelector('input[name="telefone"]').value;
    let cpf = document.querySelector('input[name="cpf"]').value;
    let data = document.querySelector('input[name="data"]').value;
    let horario = document.getElementById("horarioSelecionado").value;

    if (!horario) {
        alert("Escolha um horário antes de continuar.");
        event.preventDefault();
        return false;
    }

    let msg = `Nova visita marcada:%0A
Nome: ${nome}%0A
Telefone: ${telefone}%0A
CPF: ${cpf}%0A
Data: ${data}%0A
Horário: ${horario}`;

    window.open(`https://wa.me/5521995358009?text=${msg}`, '_blank');

    return true;
}

</script>

</body>
</html>
