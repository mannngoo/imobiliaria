<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    background: #0b0b0b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.box {
    background: #111;
    padding: 40px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-radius: 8px;
    background: #1a1a1a;
    color: #fff;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg,#d4af37,#b8962e);
    color: #000;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

.erro {
    color: red;
    margin-bottom: 10px;
}
</style>

</head>
<body>

<div class="box">

    <h2 style="color:#d4af37;">Painel Admin</h2>

    <!-- 🔥 mensagem de erro -->
    <div th:if="${param.erro}" class="erro">
        Usuário ou senha inválidos
    </div>

    <form action="/login" method="post">

        <!-- 🔥 NOMES CORRETOS -->
        <input type="text" name="usuario" placeholder="Usuário" required>

        <input type="password" name="senha" placeholder="Senha" required>

        <button type="submit">Entrar</button>

    </form>

</div>

</body>
</html>
