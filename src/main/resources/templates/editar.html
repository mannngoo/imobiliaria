<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Imóvel</title>
    <link rel="stylesheet" href="/css/cadastrar.css">
</head>
<body>

<div class="form-container">

    <div class="form-box">

        <h2>Editar Imóvel</h2>

        <!-- 🔥 FORM CORRETO (NÃO FECHA ANTES) -->
        <form th:action="@{/imovel/editar/{id}(id=${imovel.id})}" method="post">

            <input type="text" name="titulo" th:value="${imovel.titulo}" required>

            <input type="number" name="preco" th:value="${imovel.preco}" required>

            <input type="text" name="endereco" th:value="${imovel.endereco}" required>

            <input type="number" name="quartos" th:value="${imovel.quartos}">

            <input type="number" name="banheiros" th:value="${imovel.banheiros}">

            <input type="number" name="vagas" th:value="${imovel.vagas}">

            <input type="number" name="area" th:value="${imovel.area}">

            <select name="categoria" required>
                <option value="MEDIO" th:selected="${imovel.categoria == 'MEDIO'}">Médio</option>
                <option value="ALTO" th:selected="${imovel.categoria == 'ALTO'}">Alto</option>
            </select>

            <!-- 🔥 BOTÃO FUNCIONA AGORA -->
            <button type="submit">Salvar Alterações</button>

        </form>

    </div>

</div>

</body>
</html>
