<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Imóvel</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/">HOME</a>
    <a href="/menu" class="ativo">IMÓVEIS</a>
</nav>

<section class="detalhe-container">

    <div class="galeria">
        <button onclick="voltar()">⬅</button>

        <img id="imgPrincipal"
             th:src="@{${imovel.imagens[0]}}">

        <button onclick="proxima()">➡</button>
    </div>

    <div class="info">

        <h1 th:text="${imovel.titulo}"></h1>

        <h2 th:text="'R$ ' + ${#numbers.formatDecimal(imovel.preco,1,'POINT',2,'COMMA')}"></h2>

        <p th:text="${imovel.endereco}"></p>

        <div class="detalhes">

            <div class="item">
                <img th:src="@{/img/casa.png}">
                <strong th:text="${imovel.quartos} + ' Quartos'"></strong>
            </div>

            <div class="item">
                <img th:src="@{/img/banheiro.png}">
                <strong th:text="${imovel.banheiros} + ' Banheiros'"></strong>
            </div>

            <div class="item">
                <img th:src="@{/img/garagem.png}">
                <strong th:text="${imovel.vagas} + ' Vagas'"></strong>
            </div>

            <div class="item">
                <img th:src="@{/img/area.png}">
                <strong th:text="${imovel.area} + ' m²'"></strong>
            </div>

        </div>

        <!-- ✅ BOTÃO CORRIGIDO -->
        <a href="/contato" class="btn-visita" onclick="event.stopPropagation()">
            Marcar visita
        </a>

        <!-- CONTATO -->
        <div class="contato">

            <a href="https://wa.me/5521995358009" target="_blank" class="btn whatsapp">
                <img th:src="@{/img/whatsapp.png}">
                Falar no WhatsApp
            </a>

            <a href="https://instagram.com/cmonaco.incorporadora" target="_blank" class="btn instagram">
                <img th:src="@{/img/instagram.png}">
                Ver no Instagram
            </a>

        </div>

    </div>

</section>

<h3 class="titulo-mapa">Localização do imóvel⬇</h3>

<div class="mapa">
    <iframe
        width="100%"
        height="300"
        style="border:0"
        th:src="'https://www.google.com/maps?q=' + ${imovel.latitude} + ',' + ${imovel.longitude} + '&output=embed'">
    </iframe>
</div>

<footer class="footer">
    <div class="footer-container">

        <div class="footer-col">
            <h3>Contato</h3>
            <p>Cmonacoincorporadora@gmail.com</p>
            <p>@cmonaco_incorporadora</p>
        </div>

        <div class="footer-col">
            <h3>Atendimento</h3>
            <p>(21) 99535-8009</p>
            <p>(21) 99462-3268</p>
        </div>

        <div class="footer-col">
            <h3>Institucional</h3>
            <p>CNPJ: 24.873.323/0001-32</p>
            <p>CRECI: 82535-J</p>
        </div>

        <div class="footer-col social">
            <h3>Redes</h3>
            <a href="https://wa.me/5521995358009" target="_blank">WhatsApp</a>
            <a href="https://instagram.com/cmonaco.incorporadora" target="_blank">Instagram</a>
        </div>

    </div>
</footer>

<script th:inline="javascript">
let imagens = /*[[${imovel.imagens}]]*/ [];
let index = 0;

function atualizar() {
    document.getElementById("imgPrincipal").src = imagens[index];
}

function proxima() {
    index = (index + 1) % imagens.length;
    atualizar();
}

function voltar() {
    index = (index - 1 + imagens.length) % imagens.length;
    atualizar();
}
</script>

</body>
</html>
